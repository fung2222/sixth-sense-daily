<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="wave" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="35%" stop-color="#c44569"/>
      <stop offset="65%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Sound wave bars -->
  <rect x="12" y="22" width="5" height="20" rx="2.5" fill="url(#wave)" opacity="0.45"/>
  <rect x="20" y="16" width="5" height="32" rx="2.5" fill="url(#wave)" opacity="0.58"/>
  <rect x="28" y="11" width="5" height="42" rx="2.5" fill="url(#wave)" opacity="0.72"/>
  <rect x="36" y="14" width="5" height="36" rx="2.5" fill="url(#wave)" opacity="0.85"/>
  <rect x="44" y="18" width="5" height="28" rx="2.5" fill="url(#wave)" opacity="0.92"/>
</svg>

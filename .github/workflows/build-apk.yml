name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          # Create minimal WebView app
          mkdir -p app/src/main/java/com/sono/daily
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.sono.daily">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="第六感日報"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

          # MainActivity.java
          cat > app/src/main/java/com/sono/daily/MainActivity.java << 'JAVAEOF'
          package com.sono.daily;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import android.graphics.Color;
          
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView wv = new WebView(this);
                  wv.setWebViewClient(new WebViewClient());
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setSupportZoom(false);
                  wv.setBackgroundColor(Color.parseColor("#0a0a1a"));
                  wv.loadUrl("https://fung2222.github.io/sixth-sense-daily/");
                  setContentView(wv);
              }
          }
          JAVAEOF

          # styles.xml
          cat > app/src/main/res/values/styles.xml << 'STYLEEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
                  <item name="android:statusBarColor">#0a0a1a</item>
                  <item name="android:navigationBarColor">#0a0a1a</item>
              </style>
          </resources>
          STYLEEOF

          # build.gradle
          cat > build.gradle << 'GRADEOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          task clean(type: Delete) { delete rootProject.layout.buildDirectory }
          GRADEOF

          # app/build.gradle
          cat > app/build.gradle << 'APPGRADEOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.sono.daily'
              compileSdk 34
              defaultConfig {
                  applicationId "com.sono.daily"
                  minSdk 21; targetSdk 34; versionCode 1; versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          APPGRADEOF

          # settings.gradle
          echo "include ':app'" > settings.gradle
          echo "rootProject.name='第六感日報'" >> settings.gradle

      - name: Create keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        run: |
          gradle assembleDebug
          ls -la app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 第六感日報-v1.0
          path: app/build/outputs/apk/debug/*.apk

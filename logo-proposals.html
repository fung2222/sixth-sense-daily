<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sono Logo 設計提案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:-apple-system,'PingFang TC',sans-serif;padding:40px 20px;text-align:center}
h1{font-size:2em;background:linear-gradient(135deg,#ff6b9d,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.sub{color:#888;margin-bottom:40px;font-size:0.9em}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;max-width:900px;margin:0 auto}
.card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:28px 20px;border:1px solid rgba(255,255,255,0.06);transition:all 0.3s}
.card:hover{border-color:rgba(162,155,254,0.3);transform:translateY(-2px)}
.card .preview{width:100px;height:100px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);border-radius:20px}
.card h3{font-size:1.1em;color:#fff;margin-bottom:6px}
.card p{font-size:0.8em;color:#888;line-height:1.5}
.footer{margin-top:50px;color:#555;font-size:0.8em}
</style>
</head>
<body>
<h1>Sono 品牌標誌提案</h1>
<p class="sub">揀一個方向，我再精細化 ➔ 變成 favicon + site logo</p>

<div class="grid">

<!-- Option 1: Neural S -->
<div class="card">
  <div class="preview">
    <svg viewBox="0 0 80 80" width="80" height="80">
      <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b9d"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient></defs>
      <circle cx="40" cy="16" r="5" fill="url(#g1)" opacity="0.9"/>
      <circle cx="24" cy="34" r="5" fill="url(#g1)" opacity="0.7"/>
      <circle cx="56" cy="34" r="5" fill="url(#g1)" opacity="0.5"/>
      <circle cx="40" cy="52" r="5" fill="url(#g1)" opacity="0.7"/>
      <circle cx="24" cy="64" r="5" fill="url(#g1)" opacity="0.9"/>
      <line x1="40" y1="21" x2="29" y2="29" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
      <line x1="40" y1="21" x2="51" y2="29" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
      <line x1="29" y1="39" x2="51" y2="39" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>
      <line x1="29" y1="39" x2="40" y2="47" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>
      <line x1="51" y1="39" x2="40" y2="47" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>
      <line x1="29" y1="52" x2="29" y2="59" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
      <line x1="40" y1="57" x2="40" y2="59" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
    </svg>
  </div>
  <h3>① 神經網絡 · S</h3>
  <p>節點連線形成抽象「S」形<br>代表 AI + 科技感<br>粉紅→紫漸變</p>
</div>

<!-- Option 2: Sound Wave -->
<div class="card">
  <div class="preview">
    <svg viewBox="0 0 80 80" width="80" height="80">
      <defs><linearGradient id="g2" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#a29bfe"/><stop offset="100%" stop-color="#6bff6b"/></linearGradient></defs>
      <rect x="18" y="28" width="6" height="24" rx="3" fill="url(#g2)" opacity="0.5"/>
      <rect x="28" y="20" width="6" height="40" rx="3" fill="url(#g2)" opacity="0.65"/>
      <rect x="38" y="14" width="6" height="52" rx="3" fill="url(#g2)" opacity="0.8"/>
      <rect x="48" y="20" width="6" height="40" rx="3" fill="url(#g2)" opacity="0.65"/>
      <rect x="58" y="28" width="6" height="24" rx="3" fill="url(#g2)" opacity="0.5"/>
    </svg>
  </div>
  <h3>② 聲波頻譜</h3>
  <p>Sono = 聲音，頻率條形成「S」曲線<br>紫→青漸變<br>簡約現代感</p>
</div>

<!-- Option 3: Crystal Eye -->
<div class="card">
  <div class="preview">
    <svg viewBox="0 0 80 80" width="80" height="80">
      <defs><linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffd93d"/><stop offset="50%" stop-color="#ff6b9d"/><stop offset="100%" stop-color="#6c5ce7"/></linearGradient></defs>
      <polygon points="40,10 62,32 56,58 24,58 18,32" fill="none" stroke="url(#g3)" stroke-width="2.5" stroke-linejoin="round"/>
      <polygon points="40,22 50,34 46,50 34,50 30,34" fill="none" stroke="url(#g3)" stroke-width="1.5" opacity="0.6"/>
      <circle cx="40" cy="38" r="6" fill="url(#g3)" opacity="0.7"/>
      <circle cx="40" cy="38" r="3" fill="#0a0a1a"/>
      <circle cx="40" cy="37" r="1.2" fill="#fff" opacity="0.8"/>
    </svg>
  </div>
  <h3>③ 水晶之眼</h3>
  <p>六角水晶 + 瞳孔<br>代表直覺、預知、超自然<br>金→粉→紫三色</p>
</div>

<!-- Option 4: Interlocking S -->
<div class="card">
  <div class="preview">
    <svg viewBox="0 0 80 80" width="80" height="80">
      <defs><linearGradient id="g4a" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b9d"/><stop offset="100%" stop-color="#c44569"/></linearGradient><linearGradient id="g4b" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a29bfe"/><stop offset="100%" stop-color="#6c5ce7"/></linearGradient></defs>
      <path d="M25 20 Q40 8 55 20 Q60 35 55 45 Q45 55 40 60 Q35 55 25 45 Q20 35 25 20Z" fill="none" stroke="url(#g4a)" stroke-width="3" stroke-linecap="round"/>
      <path d="M25 60 Q40 72 55 60 Q60 45 55 35 Q45 25 40 20 Q35 25 25 35 Q20 45 25 60Z" fill="none" stroke="url(#g4b)" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <h3>④ 雙環無限 · S</h3>
  <p>兩個交織嘅環形成「S」<br>象徵 AI + 人類共生<br>粉紅 + 紫雙色</p>
</div>

</div>

<div class="footer">揀定方向後 → 做 favicon (32×32) + site logo (SVG) + PWA icon</div>
</body>
</html>

<title>Sono每日 2026.06.26</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #0a0a1a; color: #e0e0e0; line-height: 1.8; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  .header-text {
    text-align: center;
    margin-bottom: 30px;
  }
  .logo {
    font-size: 4em; 
    font-weight: 900; 
    letter-spacing: 5px;
    background: linear-gradient(135deg, #ff6b9d, #c44569, #a29bfe, #6c5ce7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 40px rgba(255,107,157,0.4);
    line-height: 1;
    margin-bottom: 15px;
  }
  .title { 
    font-size: 1.8em; 
    font-weight: 700; 
    background: linear-gradient(90deg, #ffd93d, #ff6b9d, #a29bfe, #6bff6b); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    background-clip: text; 
    letter-spacing: 4px;
    margin-bottom: 15px;
    line-height: 1;
  }
  .date { color: #888; font-size: 1.1em; margin-bottom: 10px; text-align: center; }
  .subtitle { color: #a29bfe; font-size: 0.95em; font-style: italic; opacity: 0.8; }
  .back-link { text-align: center; margin: 8px 0 8px; }
  .back-link a { color: #a29bfe; text-decoration: none; font-size: 0.85em; padding: 6px 16px; border: 1px solid #333; border-radius: 16px; transition: all 0.3s; }
  .back-link a:hover { background: #1a1a3a; border-color: #a29bfe; }
  .weather-box { background: linear-gradient(135deg, #1a2438, #131d2e); border-radius: 12px; padding: 10px 18px 18px; margin: 4px 0 30px; border: 1px solid rgba(120,160,190,0.25); box-shadow: 0 0 12px rgba(80,130,170,0.08); }
  .weather-box h2 { color: #7eb8d4; font-size: 1.1em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .weather-today { display: flex; gap: 15px; margin-bottom: 12px; }
  .weather-main { flex: 0 0 120px; text-align: center; padding: 10px; background: rgba(120,160,190,0.08); border-radius: 8px; }
  .weather-main .temp { font-size: 2.5em; font-weight: bold; color: #fff; line-height: 1; }
  .weather-main .temp-range { font-size: 0.85em; color: #aaa; margin-top: 5px; }
  .weather-main .icon { font-size: 2em; margin-bottom: 5px; }
  .weather-main .desc { font-size: 0.8em; color: #bbb; margin-top: 5px; }
  .weather-details { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .weather-detail-item { background: rgba(0,212,255,0.08); padding: 8px 10px; border-radius: 6px; text-align: center; }
  .weather-detail-item .label { color: #888; font-size: 0.7em; margin-bottom: 2px; }
  .weather-detail-item .value { color: #fff; font-size: 1em; font-weight: bold; }
  .weather-detail-item .value.alert { color: #ff6b6b; }
  .forecast-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,212,255,0.2); }
  .forecast-section h3 { color: #7eb8d4; font-size: 0.85em; margin-bottom: 8px; opacity: 0.8; }
  .forecast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
  .forecast-day { background: rgba(120,160,190,0.06); padding: 8px 4px; border-radius: 6px; text-align: center; min-height: 85px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
  .forecast-day .weekday { color: #888; font-size: 0.7em; }
  .forecast-day .date { color: #aaa; font-size: 0.75em; }
  .forecast-day .ficon { font-size: 1.2em; }
  .forecast-day .ftemp { color: #fff; font-size: 0.8em; font-weight: bold; }
  .forecast-day .ftemp-lo { color: #888; font-size: 0.7em; }
  .weather-links { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .weather-link { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; background: rgba(120,160,190,0.1); border-radius: 15px; color: #7eb8d4; text-decoration: none; font-size: 0.8em; transition: background 0.2s; }
  .weather-link:hover { background: rgba(120,160,190,0.25); }
  .weather-insight { margin-top: 15px; padding: 15px; background: linear-gradient(135deg, rgba(255,107,157,0.08), rgba(162,155,254,0.08)); border-radius: 10px; border-left: 3px solid #ff6b9d; }
  .weather-insight h3 { color: #ff6b9d; font-size: 0.95em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .weather-insight .insight-text { color: #e0e0e0; font-size: 0.9em; line-height: 1.7; }
  .weather-insight .recommendation { margin: 8px 0; padding: 8px 12px; background: rgba(255,107,157,0.05); border-radius: 6px; display: flex; align-items: center; gap: 10px; }
  .weather-insight .recommendation .emoji { font-size: 1.3em; }
  .weather-insight .recommendation .text { color: #bbb; font-size: 0.85em; }
  .section { margin: 0; }
  
.news-tab-bar{display:flex;gap:4px;margin:20px 0 2px;background:rgba(255,255,255,0.03);border-radius:12px;padding:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}.news-tab-bar::-webkit-scrollbar{height:0}.news-tab{flex:1;min-width:65px;padding:10px 6px;border:none;border-radius:10px;cursor:pointer;font-size:.78em;font-weight:700;font-family:inherit;text-align:center;white-space:nowrap;transition:all .3s;background:transparent;color:#666}.news-tab:hover{background:rgba(255,255,255,0.04);color:#999}.news-tab .tab-icon{display:block;font-size:1.5em;margin-bottom:2px}.news-tab.active[data-section=ai]{background:rgba(0,212,255,0.12);color:#00d4ff;box-shadow:0 0 12px rgba(0,212,255,0.1)}.news-tab.active[data-section=space]{background:rgba(107,255,107,0.12);color:#6bff6b;box-shadow:0 0 12px rgba(107,255,107,0.1)}.news-tab.active[data-section=ufo]{background:rgba(255,107,107,0.12);color:#ff6b6b;box-shadow:0 0 12px rgba(255,107,107,0.1)}.news-tab.active[data-section=paranormal]{background:rgba(255,217,61,0.12);color:#ffd93d;box-shadow:0 0 12px rgba(255,217,61,0.1)}.section-panel{margin-top:0;display:none;animation:fadeIn .35s ease}.section-panel.active{display:block!important}
  .news-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 12px; padding: 20px; margin: 7px 0; border-left: 4px solid; transition: transform 0.2s; overflow: hidden; cursor: pointer; }
  .news-card:hover { transform: translateX(5px); }
  .news-card.ai { border-left-color: #00d4ff; }
  .news-card.space { border-left-color: #6bff6b; }
  .news-card.ufo { border-left-color: #ff6b6b; }
  .news-card.paranormal { border-left-color: #ffd93d; }
  .news-card img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
  .news-card h3 { color: #fff; font-size: 1.2em; margin-bottom: 6px; }
  .news-card .expand-hint { color: #a29bfe; font-size: 0.78em; margin-bottom: 6px; }
  .news-card .detail { display: none; }
  .news-card.open .detail { display: block; }
  .news-card.open .expand-hint { color: #ff6b9d; }
  .news-card .meta { color: #888; font-size: 0.85em; margin-bottom: 10px; }
  .news-card p { color: #bbb; line-height: 1.7; margin-bottom: 8px; }
  .news-card a { color: #00d4ff; text-decoration: none; }
  .news-card a:hover { text-decoration: underline; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.75em; font-weight: bold; margin-right: 5px; }
  .tag.breakthrough { background: #00d4ff; color: #000; }
  .tag.trend { background: #6bff6b; color: #000; }
  .tag.alert { background: #ff6b6b; color: #fff; }
  .footer { text-align: center; color: #555; margin-top: 50px; padding: 20px; border-top: 1px solid #222; font-size: 0.85em; }
  .back-to-top { position: fixed; bottom: 30px; right: 20px; width: 45px; height: 45px; background: linear-gradient(135deg, #ff6b9d, #c44569); color: #fff; border-radius: 50%; text-align: center; line-height: 45px; font-size: 1.2em; text-decoration: none; box-shadow: 0 4px 15px rgba(255,107,157,0.4); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 1000; }
  .back-to-top.show { opacity: 1; visibility: visible; }
  .back-to-top:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,107,157,0.6); }

<style>
/* Accordion boxes */
.sono-column { margin: 30px 0; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
.sc-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:linear-gradient(135deg,#2d1b4e,#4e1b2d); cursor:pointer; user-select:none; transition:background 0.3s; }
.sc-header:hover { background:linear-gradient(135deg,#3d2b5e,#5e2b3d); }
.sc-title { font-size:1.2em; font-weight:700; color:#e0e0e0; }
.sc-arrow { font-size:0.9em; color:#a29bfe; transition:transform 0.4s ease; }
.sc-header.open .sc-arrow { transform:rotate(180deg); }
.sc-body { display:block; overflow:hidden; transition:max-height 0.6s ease; }
.sc-body.open { display:block; }

.sc-sub { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:rgba(255,255,255,0.03); cursor:pointer; border-top:1px solid rgba(255,255,255,0.06); transition:background 0.3s; user-select:none; }
.sc-sub:hover { background:rgba(255,255,255,0.06); }
.sc-sub-title { font-size:1em; font-weight:600; color:#ddd; }
.sc-sub-arrow { font-size:0.7em; color:#888; transition:transform 0.4s ease; }
.sc-sub.open .sc-sub-arrow { transform:rotate(180deg); }
.sc-sub-body { display:none; overflow:hidden; transition:max-height 0.5s ease; padding:0 20px; }
.sc-sub-body.open { display:block; padding:15px 20px; padding:15px 20px; }
.sc-sub-body .observation { margin:12px 0; padding-left:16px; border-left:3px solid #a29bfe; color:#ccc; font-size:0.9em; line-height:1.7; }
.sc-sub-body .prediction { margin:12px 0; padding:12px 16px; background:rgba(162,155,254,0.08); border-radius:8px; color:#ccc; font-size:0.9em; line-height:1.7; }
.sc-sub-body .quote p { color:#ddd; }
.sc-sub-body strong { color:#a29bfe; }





</style>

<a href="#" class="back-to-top" id="backToTop" title="回到最頂">TOP</a>

<script>
  window.addEventListener('scroll', function() {
    var b = document.getElementById('backToTop');
    b.classList.toggle('show', window.pageYOffset > 300);
  });
</script>

<script>
document.querySelectorAll('.news-card').forEach(card => {
  card.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') return;
    var wasOpen = this.classList.contains('open');
    document.querySelectorAll('.news-card').forEach(c => c.classList.remove('open'));
    if (!wasOpen) this.classList.add('open');
  });
});
</script>

<script>function switchNewsTab(i){document.querySelectorAll(".news-tab").forEach(b=>b.classList.remove("active"));document.querySelectorAll(".section-panel").forEach(p=>{p.classList.remove("active");p.style.display="none"});document.querySelector('.news-tab[data-section="'+i+'"]').classList.add("active");var el=document.getElementById("panel-"+i);if(el){el.classList.add("active");el.style.display="block"}}</script>

<script>
function toggleSub(sub) {
  var allSubs = document.querySelectorAll('.sc-sub');
  allSubs.forEach(function(s) {
    if (s !== sub && s.classList.contains('open')) {
      s.classList.remove('open');
      s.nextElementSibling.classList.remove('open');
    }
  });
  sub.classList.toggle('open');
  sub.nextElementSibling.classList.toggle('open');
}
</script>

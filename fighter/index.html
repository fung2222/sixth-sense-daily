<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>Stickman Fighter v3.5</title>
<style>
body { margin:0; background:#0a0a1f; color:#fff; font-family: system-ui, sans-serif; display:flex; flex-direction:column; align-items:center; }
#title { font-size:28px; margin:10px 0 5px; display:flex; justify-content:space-between; width:640px; }
#version { font-size:14px; color:#888; align-self:flex-end; }
canvas { border:2px solid #333; background:#111; }
#controls { margin-top:10px; }
button { padding:8px 16px; margin:4px; font-size:16px; }
</style>
</head>
<body>
<div id="title">
  <div>Stickman Fighter</div>
  <div id="version">v3.5</div>
</div>
<canvas id="game" width="640" height="505"></canvas>
<div id="controls">
  <button onclick="restart()">重新開始</button>
</div>
<script>
// ==================== Stickman Fighter v3.5 (已升級) ====================
// 改動記錄：
// - 整體戰鬥速度 -20% (MOVE_SPEED 3.52, JUMP_FORCE -12, GRAVITY 0.416)
// - 整體傷害 -18%
// - 取消狂暴(Enrage)系統
// - 防禦改為長按持續

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const MOVE_SPEED = 3.52;
const JUMP_FORCE = -12;
const GRAVITY = 0.416;
const MAX_HP = 100;

const WEAPONS = {
  sword: { name:'雙刀', slashDmg:6.56, slashRange:120 },
  gun:   { name:'步槍', rangedDmg:4.92 },
  magic: { name:'魔法', slashDmg:8.2, slashRange:100 },
  fist:  { name:'拳套', slashDmg:3.28, slashRange:75 }
};

let player, ai, projectiles = [], particles = [];
let keys = {};
let defending = false;

function createFighter(x, isAI) {
  return {
    x, y: 400, vx:0, vy:0, facing: isAI ? -1 : 1,
    hp: MAX_HP, maxHp: MAX_HP,
    defending: false, dead: false, isAI,
    color: isAI ? '#ff6b6b' : '#4ecdc4',
    pose: 'idle', targetPose: 'idle', animProgress:0
  };
}

function resetGame() {
  player = createFighter(150, false);
  ai = createFighter(490, true);
  projectiles = [];
  particles = [];
  defending = false;
}

function update() {
  if (!player || !ai || player.dead || ai.dead) return;

  if (keys['ArrowLeft']) player.vx = -MOVE_SPEED;
  else if (keys['ArrowRight']) player.vx = MOVE_SPEED;
  else player.vx *= 0.8;

  if (keys[' '] && player.y >= 400) {
    player.vy = JUMP_FORCE;
  }

  player.x += player.vx;
  player.y += player.vy;
  player.vy += GRAVITY;

  if (player.y > 400) { player.y = 400; player.vy = 0; }

  if (ai.x < player.x - 80) ai.x += MOVE_SPEED * 0.7;
  else if (ai.x > player.x + 80) ai.x -= MOVE_SPEED * 0.7;

  player.defending = defending;

  if (Math.abs(player.x - ai.x) < 60 && !player.defending) {
    player.hp -= 0.8;
  }
  if (Math.abs(player.x - ai.x) < 60 && !ai.defending) {
    ai.hp -= 0.8;
  }

  if (player.hp <= 0) player.dead = true;
  if (ai.hp <= 0) ai.dead = true;
}

function drawFighter(f) {
  ctx.fillStyle = f.color;
  ctx.fillRect(f.x - 15, f.y - 60, 30, 60);
  ctx.fillStyle = '#fff';
  ctx.fillText(Math.floor(f.hp), f.x - 10, f.y - 75);
}

function render() {
  ctx.fillStyle = '#0a0a1f';
  ctx.fillRect(0, 0, 640, 505);

  drawFighter(player);
  drawFighter(ai);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText('Player', 50, 30);
  ctx.fillText('AI', 550, 30);
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

function restart() {
  resetGame();
}

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key.toLowerCase() === 'd') defending = true;
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (e.key.toLowerCase() === 'd') defending = false;
});

canvas.addEventListener('touchstart', e => {
  if (e.touches.length > 0) defending = true;
});
canvas.addEventListener('touchend', () => defending = false);

resetGame();
gameLoop();
</script>
</body>
</html>

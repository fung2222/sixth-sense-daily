<svg class="game-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gf3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6bff6b"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Head -->
  <circle cx="24" cy="11" r="5" fill="#feca57" stroke="url(#gf3)" stroke-width="2.5"/>
  <!-- Body -->
  <line x1="24" y1="16" x2="24" y2="27" stroke="url(#gf3)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Left hand (rock) -->
  <circle cx="13" cy="18" r="4" fill="#feca57" stroke="url(#gf3)" stroke-width="2"/>
  <!-- Right hand (scissors) -->
  <line x1="35" y1="16" x2="42" y2="10" stroke="url(#gf3)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="16" x2="42" y2="20" stroke="url(#gf3)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="24" y1="27" x2="17" y2="39" stroke="url(#gf3)" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="27" x2="31" y2="39" stroke="url(#gf3)" stroke-width="3" stroke-linecap="round"/>
</svg>

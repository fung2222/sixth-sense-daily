<svg class="game-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gf2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6bff6b"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- Head -->
  <circle cx="20" cy="12" r="5.5" fill="#feca57" stroke="url(#gf2)" stroke-width="2.5"/>
  <!-- Body (angled) -->
  <line x1="20" y1="17.5" x2="24" y2="29" stroke="url(#gf2)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Sword arm -->
  <line x1="24" y1="20" x2="36" y2="13" stroke="url(#gf2)" stroke-width="3" stroke-linecap="round"/>
  <!-- Sword blade -->
  <line x1="36" y1="13" x2="43" y2="8" stroke="#feca57" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shield arm -->
  <line x1="20" y1="20" x2="10" y2="25" stroke="url(#gf2)" stroke-width="3" stroke-linecap="round"/>
  <!-- Shield -->
  <rect x="5" y="22" width="7" height="9" rx="1.5" fill="none" stroke="#feca57" stroke-width="1.8"/>
  <!-- Legs -->
  <line x1="24" y1="29" x2="15" y2="41" stroke="url(#gf2)" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="29" x2="33" y2="40" stroke="url(#gf2)" stroke-width="3" stroke-linecap="round"/>
  <!-- Spark -->
  <circle cx="40" cy="10" r="1.5" fill="#00d4ff"/>
  <circle cx="42" cy="13" r="1" fill="#6bff6b" opacity="0.8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0a1a"/>
  <!-- Sound wave bars in circle clip -->
  <defs>
    <clipPath id="circClip"><circle cx="256" cy="256" r="150"/></clipPath>
    <linearGradient id="barG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#circClip)">
    <rect x="132" y="216" width="28" height="80" rx="14" fill="#ff6b9d" opacity="0.5"/>
    <rect x="176" y="186" width="28" height="140" rx="14" fill="#e05580" opacity="0.65"/>
    <rect x="220" y="156" width="28" height="200" rx="14" fill="#c44569" opacity="0.78"/>
    <rect x="264" y="170" width="28" height="172" rx="14" fill="#b07ae0" opacity="0.88"/>
    <rect x="308" y="196" width="28" height="120" rx="14" fill="#a29bfe" opacity="0.92"/>
    <rect x="352" y="220" width="28" height="72" rx="14" fill="#6c5ce7" opacity="0.95"/>
  </g>
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
</svg>